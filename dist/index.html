<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <meta name="theme-color" content="#07111f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MediSync Labs" />
  <meta name="format-detection" content="telephone=no, date=no, email=no, address=no" />
  <meta name="description" content="MediSync Labs helps you understand your bloodwork with clear educational health insights." />

  <title>MediSync Labs</title>

  <style>
    /* --- your styles unchanged --- */
    :root {
      --bg: #06101b;
      --bg-2: #08192d;
      --card: rgba(8, 20, 34, 0.82);
      --card-2: rgba(10, 24, 40, 0.95);
      --stroke: rgba(255, 255, 255, 0.08);
      --stroke-strong: rgba(255, 255, 255, 0.14);
      --text: #f3fbff;
      --muted: #9db4c8;
      --blue: #00c8ff;
      --blue-soft: #6be7ff;
      --mint: #7effcf;
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.38);
      --radius-xl: 30px;
      --radius-lg: 22px;
      --radius-md: 18px;
      --safe-top: env(safe-area-inset-top);
      --safe-bottom: env(safe-area-inset-bottom);
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 15%, rgba(0, 200, 255, 0.16), transparent 22%),
        radial-gradient(circle at 85% 10%, rgba(126, 255, 207, 0.12), transparent 18%),
        radial-gradient(circle at 50% 100%, rgba(0, 122, 255, 0.10), transparent 24%),
        linear-gradient(180deg, #04101a 0%, #071423 45%, #05101b 100%);
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      pointer-events: none;
      z-index: 0;
      opacity: 0.45;
    }

    body::before {
      width: 240px;
      height: 240px;
      top: 4%;
      right: -80px;
      background: rgba(0, 200, 255, 0.18);
    }

    body::after {
      width: 220px;
      height: 220px;
      left: -90px;
      bottom: 4%;
      background: rgba(126, 255, 207, 0.12);
    }

    a { color: inherit; text-decoration: none; }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: calc(20px + var(--safe-top)) 16px calc(24px + var(--safe-bottom));
    }

    .shell { width: 100%; max-width: 520px; }

    .card {
      position: relative;
      overflow: hidden;
      background: linear-gradient(180deg, rgba(10, 24, 40, 0.96), rgba(7, 19, 33, 0.98));
      border: 1px solid var(--stroke);
      border-radius: var(--radius-xl);
      padding: 28px 22px 20px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 85% 12%, rgba(0, 200, 255, 0.13), transparent 18%),
        radial-gradient(circle at 0% 100%, rgba(126, 255, 207, 0.08), transparent 18%),
        linear-gradient(180deg, rgba(255,255,255,0.04), transparent 20%);
      pointer-events: none;
    }

    .inner { position: relative; z-index: 1; }

    .logo-wrap {
      display:flex; justify-content:center; align-items:center;
      margin:0 0 6px; position:relative;
    }

    .logo-wrap::before {
      content:""; position:absolute;
      width:150px; height:150px; border-radius:50%;
      background: radial-gradient(circle, rgba(0, 200, 255, 0.16) 0%, rgba(0, 200, 255, 0.08) 34%, rgba(0, 200, 255, 0.02) 58%, transparent 74%);
      filter: blur(20px);
      pointer-events:none;
      z-index:0;
    }

    .logo-img {
      position:relative; z-index:1;
      width:88px; height:auto; display:block; object-fit:contain;
      filter: drop-shadow(0 10px 22px rgba(0, 200, 255, 0.16)) drop-shadow(0 2px 8px rgba(0, 0, 0, 0.18));
    }

    .headline {
      text-align:center;
      margin: 0 0 10px;
      font-size: clamp(2rem, 8vw, 3.2rem);
      line-height: 0.95;
      letter-spacing: -0.065em;
    }

    .subtext {
      margin: 0 auto 20px;
      max-width: 30ch;
      text-align: center;
      color: #cbdfee;
      font-size: 1rem;
      line-height: 1.58;
    }

    .form-wrap { display:grid; gap:14px; margin-top: 10px; }

    .input-shell {
      display:flex; align-items:center; gap:10px;
      height:60px; padding:0 16px;
      border-radius:18px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.10);
      transition: border-color .18s ease, box-shadow .18s ease, background .18s ease;
    }

    .input-shell:focus-within {
      border-color: rgba(107,231,255,0.78);
      background: rgba(255,255,255,0.08);
      box-shadow: 0 0 0 4px rgba(0, 200, 255, 0.12);
    }

    .input-shell svg { width:18px; height:18px; opacity:.78; flex-shrink:0; }
    .input-shell input {
      width:100%;
      border:0; outline:none;
      background:transparent;
      color:#f4fbff;
      font-size:1rem;
      font-family:inherit;
      font-weight:500;
      appearance:none;
    }
    .input-shell input::placeholder { color:#90a9bc; }

    .cta-btn, .secondary-btn {
      width:100%; min-height:58px;
      border-radius:18px;
      border:0;
      cursor:pointer;
      font-family:inherit;
      font-size:1rem;
      font-weight:800;
      letter-spacing:-0.02em;
      transition: transform .18s ease, box-shadow .18s ease, background .18s ease, border-color .18s ease;
    }

    .cta-btn {
      color:#052238;
      background: linear-gradient(135deg, #c5fdff 0%, #7becff 38%, #00c8ff 100%);
      box-shadow: 0 18px 35px rgba(0, 200, 255, 0.26);
    }

.cta-btn:hover,
.cta-btn:active {
  transform: translateY(-1px);
  box-shadow:
    0 22px 40px rgba(0, 200, 255, 0.30),
    0 0 0 4px rgba(0, 200, 255, 0.08);
}

.cta-btn:focus-visible {
  outline: none;
  box-shadow:
    0 0 0 4px rgba(0, 200, 255, 0.14),
    0 22px 40px rgba(0, 200, 255, 0.30);
}

.secondary-btn {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 14px;
  width: 100%;
  min-height: 64px;
  padding: 14px 16px;
  border-radius: 20px;
  color: #f3fbff;
  background:
    linear-gradient(180deg, rgba(255,255,255,0.085), rgba(255,255,255,0.045));
  border: 1px solid rgba(107, 231, 255, 0.18);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.04),
    0 10px 28px rgba(0,0,0,0.16);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  overflow: hidden;
}

.secondary-btn::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 12% 50%, rgba(0, 200, 255, 0.12), transparent 34%),
    linear-gradient(90deg, rgba(255,255,255,0.03), transparent 36%);
  pointer-events: none;
}

.secondary-btn:hover,
.secondary-btn:active {
  transform: translateY(-1px);
  border-color: rgba(107, 231, 255, 0.34);
  background:
    linear-gradient(180deg, rgba(255,255,255,0.11), rgba(255,255,255,0.06));
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.05),
    0 16px 34px rgba(0,0,0,0.2),
    0 0 0 4px rgba(0, 200, 255, 0.06);
}

.secondary-btn:focus-visible {
  outline: none;
  border-color: rgba(107, 231, 255, 0.52);
  box-shadow:
    0 0 0 4px rgba(0, 200, 255, 0.12),
    0 16px 34px rgba(0,0,0,0.2);
}

.secondary-icon,
.secondary-copy,
.secondary-arrow {
  position: relative;
  z-index: 1;
}

.secondary-icon {
  width: 40px;
  height: 40px;
  min-width: 40px;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(180deg, rgba(0,200,255,0.18), rgba(0,200,255,0.08));
  border: 1px solid rgba(107, 231, 255, 0.18);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
}

.secondary-icon svg {
  width: 18px;
  height: 18px;
  color: #bff7ff;
  opacity: 0.95;
}

.secondary-copy {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  text-align: left;
}

.secondary-label {
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: #89a7bc;
  line-height: 1.1;
  margin-bottom: 3px;
}

.secondary-title {
  font-size: 1rem;
  font-weight: 800;
  line-height: 1.2;
  letter-spacing: -0.02em;
  color: #f3fbff;
}

.secondary-arrow {
  font-size: 1.15rem;
  font-weight: 800;
  color: #9fefff;
  opacity: 0.95;
  transform: translateX(0);
  transition: transform .18s ease, opacity .18s ease;
}

.secondary-btn:hover .secondary-arrow,
.secondary-btn:active .secondary-arrow {
  transform: translateX(2px);
}
    .error-text {
      display:none;
      margin:0;
      padding: 12px 13px;
      border-radius: 14px;
      background: rgba(255, 75, 75, 0.10);
      border: 1px solid rgba(255, 100, 100, 0.18);
      color: #ffd8d8;
      font-size: 0.9rem;
      line-height: 1.45;
    }

    .footer-note {
      margin:16px auto 0;
      max-width:34ch;
      text-align:center;
      color: var(--muted);
      font-size:0.8rem;
      line-height:1.55;
    }

    .fade-up {
      opacity:0;
      transform: translateY(16px);
      transition: opacity .55s ease, transform .55s ease;
    }
    .fade-up.visible { opacity:1; transform: translateY(0); }

    @media (max-width: 480px) {
      .card { padding: 24px 16px 18px; border-radius: 24px; }
      .headline { font-size: 2.1rem; }
      .subtext { font-size: 0.97rem; }
      .secondary-btn {
        min-height: 60px;
        padding: 13px 14px;
        border-radius: 18px;
      }

      .secondary-icon {
        width: 36px;
        height: 36px;
        min-width: 36px;
        border-radius: 12px;
      }

      .secondary-title {
        font-size: 0.96rem;
      }

      .secondary-label {
        font-size: 0.68rem;
      }
    }

@media (max-width: 361px) {
  .headline {
    font-size: 1.75rem;
    line-height: 1;
    letter-spacing: -0.05em;
  }

  .secondary-title {
    font-size: 0.88rem;
  }

  .secondary-label {
    font-size: 0.64rem;
  }

  .secondary-btn {
    padding: 12px 13px;
  }

  .secondary-icon {
    width: 34px;
    height: 34px;
    min-width: 34px;
  }
}
  </style>
</head>

<body>
  <main class="page">
    <div class="shell">
      <section class="card fade-up">
        <div class="inner">
          <div class="logo-wrap">
            <img
              id="logoImg"
              alt="MediSync Labs logo"
              class="logo-img"
            />
          </div>

          <h1 class="headline">A smarter way to manage your health.</h1>

          <p class="subtext">Start with your email and continue into MediSync Labs.</p>

          <form id="iosQuickSignupForm" class="form-wrap" method="POST" novalidate>
            <div class="input-shell">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
                <path d="M4 6.75h16a1.25 1.25 0 0 1 1.25 1.25v8A1.25 1.25 0 0 1 20 17.25H4A1.25 1.25 0 0 1 2.75 16V8A1.25 1.25 0 0 1 4 6.75Z"></path>
                <path d="m3.5 8 7.7 5.27a1.5 1.5 0 0 0 1.6 0L20.5 8"></path>
              </svg>

              <input
                id="iosEmail"
                name="email"
                type="email"
                autocomplete="email"
                inputmode="email"
                placeholder="Email address"
                required
              />
            </div>

            <input type="hidden" name="meta_event_id" id="meta_event_id">
            <input type="hidden" name="meta_fbp" id="meta_fbp">
            <input type="hidden" name="meta_fbc" id="meta_fbc">
            <input type="hidden" name="source" value="ios">

            <p id="emailError" class="error-text">Please enter a valid email address.</p>

            <button class="cta-btn" type="submit">Continue</button>

            <a class="secondary-btn login-btn" id="loginLink" href="#">
              <span class="secondary-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M12 12a4 4 0 1 0-4-4 4 4 0 0 0 4 4Z"></path>
                  <path d="M4.75 19.25a7.25 7.25 0 0 1 14.5 0"></path>
                </svg>
              </span>
              <span class="secondary-copy">
                <span class="secondary-label">Returning user</span>
                <span class="secondary-title">Continue to my account</span>
              </span>
              <span class="secondary-arrow" aria-hidden="true">→</span>
            </a>
          </form>

          <p class="footer-note">
            MediSync Labs provides educational health information only and does not replace licensed medical care.
          </p>
        </div>
      </section>
    </div>
  </main>

  <script>

  <!-- Keep your existing analytics + validation scripts below (unchanged) -->
  <script>
    function fireGoogleAdsSignupConversion(dedupeKey, done){
      console.log('[gads] fireGoogleAdsSignupConversion called', dedupeKey);

      var SEND_TO = 'AW-16940292599/vV9vCJ-bz_UbEPez4Y0_';
      var key = 'gads_signup_' + String(dedupeKey || Date.now());

      if (sessionStorage.getItem(key) === '1') {
        console.log('[gads] deduped, not firing again');
        if(done) done();
        return;
      }
      sessionStorage.setItem(key, '1');

      if (typeof window.gtag !== 'function') {
        console.warn('[gads] gtag not ready');
        if(done) done();
        return;
      }

      var finished = false;
      function finish(){
        if (finished) return;
        finished = true;
        console.log('[gads] event_callback fired (or fallback)');
        if (done) done();
      }

      setTimeout(finish, 900);

      console.log('[gads] sending conversion event', SEND_TO);
      window.gtag('event', 'conversion', {
        send_to: SEND_TO,
        value: 1.0,
        currency: 'CAD',
        event_callback: finish
      });
    }
  </script>

  <script>
    function isInternalTestEmail(email){
      email = String(email || "").trim().toLowerCase();
      if (!email) return false;
      if (email.endsWith("@medisynclabs.ca")) return true;
      if (email.includes("test")) return true;
      return false;
    }
  </script>

  <script>
    (function () {
      const form = document.getElementById("iosQuickSignupForm");
      const emailInput = document.getElementById("iosEmail");
      const emailError = document.getElementById("emailError");
      const fadeNodes = document.querySelectorAll(".fade-up");

      function isValidEmail(value) {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(String(value).trim());
      }

      function showError(message) {
        if (!emailError) return;
        emailError.textContent = message;
        emailError.style.display = "block";
      }

      function clearError() {
        if (!emailError) return;
        emailError.style.display = "none";
      }

      function getCookie(name) {
        const match = document.cookie.match('(^|;)\\s*' + name + '\\s*=\\s*([^;]+)');
        return match ? match.pop() : null;
      }

      if (form) {
        form.addEventListener("submit", function (e) {
          e.preventDefault();

          const email = (emailInput?.value || "").trim().toLowerCase();

          if (!isValidEmail(email)) {
            showError("Please enter a valid email address.");
            if (emailInput) emailInput.focus();
            return;
          }

          clearError();

          const eventID = "evt_" + Date.now() + "_" + Math.floor(Math.random() * 100000);

          const fbp = getCookie("_fbp");
          const fbc = getCookie("_fbc");

          const hiddenEventIdInput = document.getElementById("meta_event_id");
          const hiddenFbpInput = document.getElementById("meta_fbp");
          const hiddenFbcInput = document.getElementById("meta_fbc");

          if (hiddenEventIdInput) hiddenEventIdInput.value = eventID;
          if (hiddenFbpInput) hiddenFbpInput.value = fbp || "";
          if (hiddenFbcInput) hiddenFbcInput.value = fbc || "";

          sessionStorage.setItem("meta_event_id", eventID);
          sessionStorage.setItem("meta_fbp", fbp || "");
          sessionStorage.setItem("meta_fbc", fbc || "");

          if (typeof window.fbq === "function") {
            fbq("set", "eventID", eventID);
            fbq("trackCustom", "msl_reg", {
              value: 0.1,
              currency: "CAD",
              content_ids: ["free"],
              eventID: eventID
            });
          }

          if (typeof window.ttq !== "undefined" && typeof window.ttq.track === "function") {
            ttq.track("CompleteRegistration", {
              value: 0.01,
              currency: "CAD",
              user_email: email
            });
          }

          const deadline = localStorage.getItem("medisync_trial_deadline");
          if (deadline && !form.querySelector('input[name="trial_deadline"]')) {
            const hiddenDeadline = document.createElement("input");
            hiddenDeadline.type = "hidden";
            hiddenDeadline.name = "trial_deadline";
            hiddenDeadline.value = deadline;
            form.appendChild(hiddenDeadline);
          }

          if (typeof isInternalTestEmail === "function" && isInternalTestEmail(email)) {
            console.log("[gads] skipped for internal/test email:", email);
            if (window.MSL_LOADER) window.MSL_LOADER.show();
            form.submit();
          } else if (typeof fireGoogleAdsSignupConversion === "function") {
            if (window.MSL_LOADER) window.MSL_LOADER.show();
            fireGoogleAdsSignupConversion(eventID, function () {
              form.submit();
            });
          } else {
            if (window.MSL_LOADER) window.MSL_LOADER.show();
            form.submit();
          }
        });
      }

      if (emailInput) {
        emailInput.addEventListener("input", function () {
          if (emailInput.value.trim().length > 3 && isValidEmail(emailInput.value)) {
            clearError();
          }
        });
      }

      if ("IntersectionObserver" in window) {
        const observer = new IntersectionObserver((entries) => {
          entries.forEach((entry) => {
            if (entry.isIntersecting) {
              entry.target.classList.add("visible");
              observer.unobserve(entry.target);
            }
          });
        }, { threshold: 0.15 });

        fadeNodes.forEach((node, index) => {
          node.style.transitionDelay = `${index * 80}ms`;
          observer.observe(node);
        });
      } else {
        fadeNodes.forEach((node) => node.classList.add("visible"));
      }
    })();
  </script>

<!-- Loading overlay -->
<div id="loadingOverlay"
     style="
       position: fixed;
       inset: 0;
       background: rgba(6, 16, 27, 0.72);
       backdrop-filter: blur(8px);
       -webkit-backdrop-filter: blur(8px);
       z-index: 50000;
       display: none;
       align-items: center;
       justify-content: center;
       flex-direction: column;
       text-align: center;
       padding: 24px;
     ">
  <div class="msl-loader-ring"></div>
  <div style="margin-top:14px; font-weight:800; color:#eafaff; font-size:1rem; letter-spacing:-0.02em;">
    Please wait…
  </div>
</div>

<style>
  .msl-loader-ring {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    border: 4px solid rgba(255,255,255,0.16);
    border-top-color: #00c8ff;
    border-right-color: #7effcf;
    animation: mslSpin .8s linear infinite;
    box-shadow: 0 0 24px rgba(0, 200, 255, 0.18);
  }

  @keyframes mslSpin {
    to { transform: rotate(360deg); }
  }
</style>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const overlay = document.getElementById('loadingOverlay');
  if (!overlay) return;

  let isShown = false;

  function showLoading() {
    if (isShown) return;
    isShown = true;
    overlay.style.display = 'flex';
  }

  function hideLoading() {
    isShown = false;
    overlay.style.display = 'none';
  }

  window.MSL_LOADER = {
    show: showLoading,
    hide: hideLoading,
    go(url, e) {
      try {
        if (e && (e.metaKey || e.ctrlKey || e.shiftKey || e.button === 1)) return;
      } catch (_) {}
      showLoading();
      setTimeout(() => window.location.assign(url), 20);
    }
  };

  window.addEventListener('pageshow', () => {
    hideLoading();
  });

  window.addEventListener('error', hideLoading);
  window.addEventListener('unhandledrejection', hideLoading);
});
</script>
