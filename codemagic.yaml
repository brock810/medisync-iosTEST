workflows:
  ios_testflight:
    name: iOS TestFlight (Capacitor)
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      node: latest
      groups:
        - ios_testflight

      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.quantumwebdynamics.medisynclabs.dev

      vars:
        TEAM_ID: "L5GY5W76NG"
        BUNDLE_ID: "com.quantumwebdynamics.medisynclabs.dev"
        PROJECT: "ios/App/App.xcodeproj"
        WORKSPACE: "ios/App/App.xcworkspace"
        SCHEME: "App"
        CONFIGURATION: "Release"
        APP_STORE_APPLE_ID: "6759877855"

    scripts:
      - name: Show versions
        script: |
          node -v
          npm -v
          xcodebuild -version

      - name: Install dependencies
        script: |
          npm ci

      - name: Ensure TypeScript exists
        script: |
          npm ls typescript || npm i -D typescript

      - name: Capacitor sync iOS
        script: |
          npx cap sync ios

      - name: Force bundle id in iOS native project
        script: |
          set -euo pipefail

          echo "Forcing bundle id to: ${BUNDLE_ID}"

          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier ${BUNDLE_ID}" ios/App/App/App/Info.plist || true

          PBX="ios/App/App.xcodeproj/project.pbxproj"
          if [ -f "$PBX" ]; then
            sed -i '' "s/PRODUCT_BUNDLE_IDENTIFIER = [^;]*;/PRODUCT_BUNDLE_IDENTIFIER = ${BUNDLE_ID};/g" "$PBX"
          else
            echo "Missing project.pbxproj at $PBX"
            exit 1
          fi

          echo "Bundle IDs now set to:"
          grep -n "PRODUCT_BUNDLE_IDENTIFIER" "$PBX" | head -n 20 || true
          /usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" ios/App/App/App/Info.plist || true

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install
          cd ../..

      - name: Disable signing for Pods/framework targets
        script: |
          set -euo pipefail

          ruby <<'RUBY'
          pbxproj = "ios/App/Pods/Pods.xcodeproj/project.pbxproj"

          unless File.exist?(pbxproj)
            puts "Pods project not found at #{pbxproj}"
            exit 1
          end

          text = File.read(pbxproj)

          text.gsub!(/PROVISIONING_PROFILE_SPECIFIER = [^;]*;/, 'PROVISIONING_PROFILE_SPECIFIER = "";')
          text.gsub!(/PROVISIONING_PROFILE = [^;]*;/, 'PROVISIONING_PROFILE = "";')
          text.gsub!(/CODE_SIGN_STYLE = Manual;/, 'CODE_SIGN_STYLE = Automatic;')
          text.gsub!(/CODE_SIGNING_ALLOWED = YES;/, 'CODE_SIGNING_ALLOWED = NO;')
          text.gsub!(/CODE_SIGNING_REQUIRED = YES;/, 'CODE_SIGNING_REQUIRED = NO;')

          File.write(pbxproj, text)
          puts "Updated Pods signing settings."
          RUBY

          echo "Checking Pods project for leftover provisioning settings..."
          grep -n "PROVISIONING_PROFILE" ios/App/Pods/Pods.xcodeproj/project.pbxproj || true

      - name: Verify Xcode workspace and schemes
        script: |
          set -euo pipefail
          if [ ! -d "$WORKSPACE" ]; then
            echo "Workspace not found at: $WORKSPACE"
            ls -la ios/App || true
            exit 1
          fi
          xcodebuild -list -workspace "$WORKSPACE"

      - name: Apply Codemagic code signing profiles
        script: |
          set -euo pipefail
          xcode-project use-profiles --project "$PROJECT"
          echo "Installed provisioning profiles:"
          ls -la "$HOME/Library/MobileDevice/Provisioning Profiles" || true

      - name: Increment iOS build number
        script: |
          set -euo pipefail
          cd ios/App

          # Fetch latest uploaded build number from App Store Connect / TestFlight
          LATEST_BUILD_NUMBER=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APPLE_ID" || echo 1)

          echo "Latest uploaded build number: $LATEST_BUILD_NUMBER"

          # Set next build number
          agvtool new-version -all $((LATEST_BUILD_NUMBER + 1))

          echo "New build number set to:"
          agvtool what-version -terse
          cd ../..

      - name: Build signed IPA
        script: |
          set -euo pipefail
          xcode-project build-ipa \
            --workspace "$WORKSPACE" \
            --scheme "$SCHEME" \
            --config "$CONFIGURATION"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/Archives/**/*.xcarchive

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true